name: Build skyblue

on:
  schedule:
    - cron: '0 5 * * *'
  push:
    branches:
      - main
    paths:
      - Containerfile*
      - rootfs/**
      - build/**
  workflow_dispatch:

env:
  IMAGE_NAME: ${{ github.event.repository.name }}
  REGISTRY: ghcr.io

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true


jobs:
  build-and-push:
    name: Build and push image
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    strategy:
      max-parallel: 1
      fail-fast: true
      matrix:
        # switch to official image once they are signed: quay.io/fedora/fedora-silverblue
        # see https://discussion.fedoraproject.org/t/quay-io-fedora-fedora-silverblue-39-not-updated/112593/5 
        # and https://pagure.io/workstation-ostree-config / https://pagure.io/releng/issue/10399
        base_image: ["quay.io/fedora-ostree-desktops/silverblue"]
        major_version: ["43"]
        platform:
          - linux/amd64

    steps:
      - name: Checkout repo
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Install Cosign
        uses: sigstore/cosign-installer@cad07c2e89fa2edd6e2d7bab4c1aa38e53f76003 # v4.1.1

      - name: Verify base image signature
        id: verify-base
        run: |
          if COSIGN_OUTPUT=$(cosign verify --output=json --key build/keys/quay.io-fedora-ostree-desktops.pub ${{ matrix.base_image }}:${{ matrix.major_version }} 2>/dev/null); then
            BASE_DIGEST=$(echo "$COSIGN_OUTPUT" | jq -r '.[0].critical.image."docker-manifest-digest"')

            if [[ "$BASE_DIGEST" == "null" || -z "$BASE_DIGEST" ]]; then
              echo "❌ Failed to extract digest from cosign output"
              exit 1
            fi

            echo "base_digest=${BASE_DIGEST}" >> $GITHUB_OUTPUT
            echo "✅ Base image signature verified successfully"
            echo "Verified base image digest: ${BASE_DIGEST}"
          else
            echo "❌ Base image signature verification failed!"
            exit 1
          fi

      - name: Set up Docker Buildx
        id: buildx
        uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd # v4.0.0

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@4907a6ddec9925e35a0a9e82d7399ccc52663121 # v4.1.0
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@030e881283bb7a6894de51c315a6bfe6a94e05cf # v6.0.0
        with:
          images: ${{ env.REGISTRY }}/${{ github.actor }}/${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=${{ matrix.major_version }}
            type=raw,value=latest
            type=schedule,pattern={{date 'YYYYMMDD'}}
          labels: |
            org.opencontainers.image.description=skyblue

      - name: Build and push image
        id: build-and-push
        uses: docker/build-push-action@bcafcacb16a39f128d818304e6c9c0c18556b85f # v7.1.0
        with:
          builder: ${{ steps.buildx.outputs.name }}
          file: |
            ./Containerfile
          build-args: |
            BASE_IMAGE=${{ matrix.base_image }}
            BASE_IMAGE_DIGEST=${{ steps.verify-base.outputs.base_digest }}
          platforms: ${{ matrix.platform }}
          provenance: false
          push: true
          labels: ${{ steps.meta.outputs.labels }}
          tags:  ${{ steps.meta.outputs.tags }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Sign container image
        # new v3 signing format is not supported yet, see https://github.com/containers/container-libs/issues/388#issuecomment-3397603430
        run: |
          cosign sign -y \
          --key env://COSIGN_PRIVATE_KEY \
          --new-bundle-format=false \
          --use-signing-config=false \
          ${{ env.REGISTRY }}/${{ github.actor }}/${{ env.IMAGE_NAME }}@${{ steps.build-and-push.outputs.digest }}
        env:
          COSIGN_PRIVATE_KEY: ${{ secrets.COSIGN_KEY }}
          COSIGN_EXPERIMENTAL: false
